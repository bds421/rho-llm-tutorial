tests:
  # ----------------------------------------------------------------------------
  # Level 1 - Easy Factual (5 questions)
  # ----------------------------------------------------------------------------
  - id: "factual-capital"
    difficulty: 1
    category: "Factual"
    prompt_en: "What is the capital of France? Reply with just the city name."
    prompt_de: "Was ist die Hauptstadt von Frankreich? Antworte nur mit dem Namen der Stadt."
    prompt_es: "¿Cuál es la capital de Francia? Responde solo con el nombre de la ciudad."
    validator_type: "contains_any"
    expected: ["paris", "parís"]

  - id: "factual-author"
    difficulty: 1
    category: "Factual"
    prompt_en: "Who wrote Romeo and Juliet? Reply with just the last name."
    prompt_de: "Wer hat Romeo und Julia geschrieben? Antworte nur mit dem Nachnamen."
    prompt_es: "¿Quién escribió Romeo y Julieta? Responde solo con el apellido."
    validator_type: "contains_any"
    expected: ["shakespeare"]

  - id: "factual-planet"
    difficulty: 1
    category: "Factual"
    prompt_en: "What is the largest planet in our solar system? Reply with just the planet name."
    prompt_de: "Was ist der größte Planet in unserem Sonnensystem? Antworte nur mit dem Planetennamen."
    prompt_es: "¿Cuál es el planeta más grande de nuestro sistema solar? Responde solo con el nombre del planeta."
    validator_type: "contains_any"
    expected: ["jupiter", "júpiter"]

  - id: "factual-chemistry"
    difficulty: 1
    category: "Factual"
    prompt_en: "What is the chemical symbol for gold? Reply with just the 2-letter symbol."
    prompt_de: "Was ist das chemische Symbol für Gold? Antworte nur mit dem 2-stelligen Symbol."
    prompt_es: "¿Cuál es el símbolo químico del oro? Responde solo con el símbolo de 2 letras."
    validator_type: "contains_any"
    expected: ["au"]

  - id: "factual-continent"
    difficulty: 1
    category: "Factual"
    prompt_en: "On which continent is Brazil located? Reply with just the continent name."
    prompt_de: "Auf welchem Kontinent liegt Brasilien? Antworte nur mit dem Kontinent."
    prompt_es: "¿En qué continente se encuentra Brasil? Responde solo con el nombre del continente."
    validator_type: "contains_any"
    expected: ["south america", "südamerika", "sudamérica", "america del sur", "américa del sur"]

  # ----------------------------------------------------------------------------
  # Level 2 - Formatting (5 questions)
  # ----------------------------------------------------------------------------
  - id: "formatting-json"
    difficulty: 2
    category: "Formatting"
    prompt_en: "Extract the name 'Alice' and age 30 into JSON format. Do not include markdown or explanations. Just pure JSON."
    prompt_de: "Extrahiere den Namen 'Alice' und das Alter 30 in das JSON-Format. Füge kein Markdown oder Erklärungen hinzu. Nur reines JSON."
    prompt_es: "Extrae el nombre 'Alice' y la edad 30 en formato JSON. No incluyas markdown ni explicaciones. Solo JSON puro."
    validator_type: "json"

  - id: "formatting-markdown-table"
    difficulty: 2
    category: "Formatting"
    prompt_en: "Return a markdown table with columns 'Name' and 'Age' and one row containing 'Bob' and '25'. Reply with just the markdown table."
    prompt_de: "Erstelle eine Markdown-Tabelle mit den Spalten 'Name' und 'Alter' und einer Zeile mit 'Bob' und '25'. Antworte nur mit der Markdown-Tabelle."
    prompt_es: "Devuelve una tabla markdown con las columnas 'Nombre' y 'Edad' y una fila con 'Bob' y '25'. Responde solo con la tabla markdown."
    validator_type: "contains_all"
    expected: ["|", "bob", "25"]

  - id: "formatting-csv"
    difficulty: 2
    category: "Formatting"
    prompt_en: "Format the following data into a CSV format with headers Name,Age: John (40) and Mary (35). Reply with just the CSV text without formatting blocks."
    prompt_de: "Formatiere die folgenden Daten in ein CSV-Format mit den Spalten Name,Age: John (40) und Mary (35). Antworte nur mit dem CSV-Text ohne Formatierungsblöcke."
    prompt_es: "Formatea los siguientes datos en formato CSV con los encabezados Name,Age: John (40) y Mary (35). Responde solo con el texto CSV sin bloques de formato."
    validator_type: "contains_all"
    expected: ["john,40", "mary,35"]

  - id: "formatting-html-list"
    difficulty: 2
    category: "Formatting"
    prompt_en: "Create an HTML unordered list containing exactly two elements: 'Apple' and 'Banana'. Reply with just the HTML code."
    prompt_de: "Erstelle eine ungeordnete HTML-Liste, die genau zwei Elemente enthält: 'Apple' und 'Banana'. Antworte nur mit dem HTML-Code."
    prompt_es: "Crea una lista desordenada en HTML que contenga exactamente dos elementos: 'Apple' y 'Banana'. Responde solo con el código HTML."
    validator_type: "contains_all"
    expected: ["<ul", "<li", "apple", "banana"]

  - id: "formatting-xml"
    difficulty: 2
    category: "Formatting"
    prompt_en: "Create an XML tag called 'person' with an attribute 'name' equal to 'Bob'. Reply with just the XML."
    prompt_de: "Erstelle ein XML-Tag namens 'person' mit dem Attribut 'name' gleich 'Bob'. Antworte nur mit dem XML."
    prompt_es: "Crea una etiqueta XML llamada 'person' con un atributo 'name' igual a 'Bob'. Responde solo con el XML."
    validator_type: "contains_all"
    expected: ["<person", "name=", "bob"]

  # ----------------------------------------------------------------------------
  # Level 3 - Cognitive Reflection (5 questions)
  # ----------------------------------------------------------------------------
  - id: "math-iq-bat-ball"
    difficulty: 3
    category: "Cognitive Reflection"
    prompt_en: "A bat and a ball cost $1.10 in total. The bat costs $1.00 more than the ball. How much does the ball cost in cents? Reply with just the number."
    prompt_de: "Ein Schläger und ein Ball kosten zusammen 1,10$. Der Schläger kostet 1,00$ mehr als der Ball. Wie viel kostet der Ball in Cent? Antworte nur mit der Zahl."
    prompt_es: "Un bate y una pelota cuestan $1.10 en total. El bate cuesta $1.00 más que la pelota. ¿Cuánto cuesta la pelota en centavos? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["5", "0.05", "five", "fünf", "cinco"]
    not_expected: ["10", "ten", "zehn", "diez", "0.10"]

  - id: "math-iq-machines"
    difficulty: 3
    category: "Cognitive Reflection"
    prompt_en: "If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets? Reply with just the number of minutes."
    prompt_de: "Wenn 5 Maschinen 5 Minuten brauchen, um 5 Geräte herzustellen, wie lange würden 100 Maschinen für 100 Geräte brauchen? Antworte nur mit der Anzahl der Minuten."
    prompt_es: "Si 5 máquinas tardan 5 minutos en hacer 5 artefactos, ¿cuánto tiempo tardarían 100 máquinas en hacer 100 artefactos? Responde solo con el número de minutos."
    validator_type: "contains_any"
    expected: ["5", "five", "fünf", "cinco"]
    not_expected: ["100", "hundred", "hundert", "cien"]

  - id: "math-iq-lilypad"
    difficulty: 3
    category: "Cognitive Reflection"
    prompt_en: "In a lake, there is a patch of lily pads. Every day, the patch doubles in size. If it takes 48 days for the patch to cover the entire lake, how long would it take for the patch to cover half of the lake? Reply with just the number."
    prompt_de: "In einem See gibt es ein Feld von Seerosenblättern. Jeden Tag verdoppelt sich die Größe des Feldes. Wenn es 48 Tage dauert, bis das Feld den ganzen See bedeckt, wie lange würde es dauern, bis das Feld den halben See bedeckt? Antworte nur mit der Zahl."
    prompt_es: "En un lago, hay un grupo de nenúfares. Cada día, el grupo duplica su tamaño. Si tarda 48 días en cubrir todo el lago, ¿cuánto tiempo tardaría en cubrir la mitad del lago? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["47"]
    not_expected: ["24"]

  - id: "math-iq-probability"
    difficulty: 3
    category: "Cognitive Reflection"
    prompt_en: "You flip a fair coin 3 times. Given that at least one flip was heads, what is the probability all three were heads? Reply as a simplified fraction."
    prompt_de: "Du wirfst eine faire Münze 3 Mal. Gegeben, dass mindestens ein Wurf Kopf war, wie hoch ist die Wahrscheinlichkeit, dass alle drei Kopf waren? Antworte als gekürzter Bruch."
    prompt_es: "Lanzas una moneda justa 3 veces. Dado que al menos un lanzamiento fue cara, ¿cuál es la probabilidad de que los tres hayan sido cara? Responde como fracción simplificada."
    validator_type: "contains_any"
    expected: ["1/7"]
    not_expected: ["1/8", "1/4"]

  - id: "math-iq-pills"
    difficulty: 3
    category: "Cognitive Reflection"
    prompt_en: "A doctor gives you 3 pills and tells you to take one every 30 minutes. How many minutes until you have taken all 3 pills? Reply with just the number."
    prompt_de: "Ein Arzt gibt dir 3 Tabletten und sagt, du sollst alle 30 Minuten eine nehmen. Wie viele Minuten dauert es, bis du alle 3 genommen hast? Antworte nur mit der Zahl."
    prompt_es: "Un médico te da 3 pastillas y te dice que tomes una cada 30 minutos. ¿Cuántos minutos tardarás en tomar las 3? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["60", "sixty", "sechzig", "sesenta"]
    not_expected: ["90", "ninety", "neunzig", "noventa"]

  # ----------------------------------------------------------------------------
  # Level 4 - Multi-Step Deduction (5 questions)
  # ----------------------------------------------------------------------------
  - id: "logic-speed"
    difficulty: 4
    category: "Multi-Step Deduction"
    prompt_en: "A car drives from city A to city B at 60 km/h and returns from B to A along the same route at 40 km/h. What is the average speed for the entire round trip in km/h? Reply with just the number."
    prompt_de: "Ein Auto fährt von Stadt A nach Stadt B mit 60 km/h und fährt dieselbe Strecke mit 40 km/h zurück. Was ist die Durchschnittsgeschwindigkeit für die gesamte Hin- und Rückfahrt in km/h? Antworte nur mit der Zahl."
    prompt_es: "Un coche va de la ciudad A a la B a 60 km/h y regresa por la misma ruta a 40 km/h. ¿Cuál es la velocidad promedio del viaje completo de ida y vuelta en km/h? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["48"]
    not_expected: ["50"]

  - id: "logic-digit"
    difficulty: 4
    category: "Multi-Step Deduction"
    prompt_en: "I am a three-digit number. My tens digit is 5 more than my ones digit. My hundreds digit is 8 less than my tens digit. What number am I? Reply with just the number."
    prompt_de: "Ich bin eine dreistellige Zahl. Meine Zehnerstelle ist 5 mehr als meine Einerstelle. Meine Hunderterstelle ist 8 weniger als meine Zehnerstelle. Welche Zahl bin ich? Antworte nur mit der Zahl."
    prompt_es: "Soy un número de tres dígitos. Mi dígito de las decenas es 5 más que mi dígito de las unidades. Mi dígito de las centenas es 8 menos que mi dígito de las decenas. ¿Qué número soy? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["194"]

  - id: "logic-ages"
    difficulty: 4
    category: "Multi-Step Deduction"
    prompt_en: "Alice is twice as old as Bob was when Alice was as old as Bob is now. Bob is 18. How old is Alice? Reply with just the number."
    prompt_de: "Alice ist doppelt so alt wie Bob war, als Alice so alt war wie Bob jetzt ist. Bob ist 18. Wie alt ist Alice? Antworte nur mit der Zahl."
    prompt_es: "Alice tiene el doble de la edad que tenía Bob cuando Alice tenía la edad que Bob tiene ahora. Bob tiene 18. ¿Cuántos años tiene Alice? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["24"]
    not_expected: ["36", "27"]

  - id: "logic-calendar"
    difficulty: 4
    category: "Multi-Step Deduction"
    prompt_en: "If three days ago was two days after Monday, what day will tomorrow be? Reply with just the day of the week."
    prompt_de: "Wenn vor drei Tagen zwei Tage nach Montag war, welcher Tag ist morgen? Antworte nur mit dem Wochentag."
    prompt_es: "Si hace tres días fue dos días después del lunes, ¿qué día será mañana? Responde solo con el día de la semana."
    validator_type: "contains_any"
    expected: ["sunday", "sonntag", "domingo"]

  - id: "logic-weighing"
    difficulty: 4
    category: "Multi-Step Deduction"
    prompt_en: "You have 9 identical-looking coins. One is counterfeit and slightly heavier than the rest. Using a balance scale, what is the minimum number of weighings needed to guarantee finding the heavier coin? Reply with just the number."
    prompt_de: "Du hast 9 identisch aussehende Münzen. Eine ist gefälscht und etwas schwerer. Wie viele Wägungen mit einer Balkenwaage brauchst du mindestens, um die schwerere Münze garantiert zu finden? Antworte nur mit der Zahl."
    prompt_es: "Tienes 9 monedas de aspecto idéntico. Una es falsa y ligeramente más pesada. Usando una balanza, ¿cuál es el número mínimo de pesadas necesarias para garantizar encontrar la moneda más pesada? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["2"]
    not_expected: ["3", "4"]

  - id: "logic-alpha-sequence"
    difficulty: 4
    category: "Multi-Step Deduction"
    prompt_en: "What is the next number in this sequence: 8, 5, 4, 9, 1, 7, 6, 3, 2, ...? Hint: the rule has nothing to do with arithmetic operations between the numbers. Reply with just the number."
    prompt_de: "Was kommt als Nächstes in dieser Folge: 8, 5, 4, 9, 1, 7, 6, 3, 2, ...? Hinweis: Die Regel hat nichts mit arithmetischen Operationen zwischen den Zahlen zu tun. Antworte nur mit der Zahl."
    prompt_es: "¿Qué número sigue en esta secuencia: 8, 5, 4, 9, 1, 7, 6, 3, 2, ...? Pista: la regla no tiene nada que ver con operaciones aritméticas entre los números. Responde solo con el número."
    validator_type: "contains_any"
    expected: ["0"]

  # ----------------------------------------------------------------------------
  # Level 5 - Advanced Reasoning (5 questions)
  # ----------------------------------------------------------------------------
  - id: "advanced-modular"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "What is the remainder when 2^100 is divided by 7? Reply with just the number."
    prompt_de: "Was ist der Rest, wenn 2^100 durch 7 geteilt wird? Antworte nur mit der Zahl."
    prompt_es: "¿Cuál es el resto cuando 2^100 se divide entre 7? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["2"]
    not_expected: ["1", "4"]

  - id: "advanced-clock"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "At exactly 3:15, what is the angle in degrees between the hour hand and the minute hand of a clock? Reply with just the number."
    prompt_de: "Um genau 3:15 Uhr, wie groß ist der Winkel in Grad zwischen dem Stunden- und dem Minutenzeiger einer Uhr? Antworte nur mit der Zahl."
    prompt_es: "A las 3:15 en punto, ¿cuál es el ángulo en grados entre la manecilla de la hora y la del minuto de un reloj? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["7.5", "7,5"]
    not_expected: ["0", "90"]

  - id: "advanced-meta-sequence"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "What comes next in this sequence: 3, 3, 5, 4, 4, 3, 5, 5, 4, ...? Reply with just the number."
    prompt_de: "Was kommt als Nächstes in dieser Folge: 3, 3, 5, 4, 4, 3, 5, 5, 4, ...? Antworte nur mit der Zahl."
    prompt_es: "¿Qué sigue en esta secuencia: 3, 3, 5, 4, 4, 3, 5, 5, 4, ...? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["3"]
    not_expected: ["4", "5", "6"]

  - id: "advanced-hanoi"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "In the Tower of Hanoi puzzle with 6 disks, what is the minimum number of moves needed to transfer all disks from one peg to another? Reply with just the number."
    prompt_de: "Beim Turm-von-Hanoi-Puzzle mit 6 Scheiben: Wie viele Züge braucht man mindestens, um alle Scheiben auf einen anderen Stab zu bewegen? Antworte nur mit der Zahl."
    prompt_es: "En el puzzle de la Torre de Hanói con 6 discos, ¿cuál es el número mínimo de movimientos necesarios para transferir todos los discos a otra varilla? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["63"]

  - id: "advanced-derangement"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "You randomly place 4 different letters into 4 labeled envelopes (one letter per envelope). What is the probability that NO letter ends up in its correct envelope? Reply as a simplified fraction."
    prompt_de: "Du verteilst 4 verschiedene Briefe zufällig auf 4 beschriftete Umschläge (ein Brief pro Umschlag). Wie hoch ist die Wahrscheinlichkeit, dass KEIN Brief im richtigen Umschlag landet? Antworte als gekürzter Bruch."
    prompt_es: "Colocas aleatoriamente 4 cartas diferentes en 4 sobres etiquetados (una carta por sobre). ¿Cuál es la probabilidad de que NINGUNA carta termine en su sobre correcto? Responde como fracción simplificada."
    validator_type: "contains_any"
    expected: ["3/8"]

  - id: "advanced-logic-grid"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "Five scientists — Ada, Bo, Cy, Di, Em — each study a different element (Gold, Iron, Neon, Lead, Zinc) and work on different floors (1-5). Clues: (1) Ada works exactly two floors below the Iron researcher. (2) The Neon researcher works on an odd-numbered floor. (3) Bo works on floor 4. (4) Cy studies either Gold or Zinc. (5) Di works directly one floor below the Zinc researcher. (6) Em does not study Lead. (7) The Lead researcher works on floor 1. (8) The person on floor 3 studies Gold. Reply with: Floor1=Name/Element, Floor2=Name/Element, ..., Floor5=Name/Element."
    prompt_de: "Fünf Wissenschaftler — Ada, Bo, Cy, Di, Em — erforschen je ein anderes Element (Gold, Eisen, Neon, Blei, Zink) und arbeiten auf verschiedenen Stockwerken (1-5). Hinweise: (1) Ada arbeitet genau zwei Stockwerke unter dem Eisenforscher. (2) Der Neonforscher arbeitet auf einem ungeraden Stockwerk. (3) Bo arbeitet auf Stockwerk 4. (4) Cy erforscht entweder Gold oder Zink. (5) Di arbeitet direkt ein Stockwerk unter dem Zinkforscher. (6) Em erforscht nicht Blei. (7) Der Bleiforscher arbeitet auf Stockwerk 1. (8) Die Person auf Stockwerk 3 erforscht Gold. Antworte mit: Stock1=Name/Element, Stock2=Name/Element, ..., Stock5=Name/Element."
    prompt_es: "Cinco científicos — Ada, Bo, Cy, Di, Em — estudian elementos diferentes (Oro, Hierro, Neón, Plomo, Zinc) y trabajan en pisos distintos (1-5). Pistas: (1) Ada trabaja exactamente dos pisos debajo del investigador de Hierro. (2) El investigador de Neón trabaja en un piso impar. (3) Bo trabaja en el piso 4. (4) Cy estudia Oro o Zinc. (5) Di trabaja directamente un piso debajo del investigador de Zinc. (6) Em no estudia Plomo. (7) El investigador de Plomo trabaja en el piso 1. (8) La persona del piso 3 estudia Oro. Responde con: Piso1=Nombre/Elemento, Piso2=Nombre/Elemento, ..., Piso5=Nombre/Elemento."
    validator_type: "contains_all"
    expected: ["di", "lead", "ada", "zinc", "cy", "gold", "bo", "iron", "em", "neon"]

  - id: "advanced-calculator"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "A calculator displays '1'. It has two buttons: Button A multiplies the displayed number by 2, Button B adds 1. What is the minimum number of button presses to reach exactly 100? Reply with just the number."
    prompt_de: "Ein Taschenrechner zeigt '1'. Er hat zwei Tasten: Taste A multipliziert die angezeigte Zahl mit 2, Taste B addiert 1. Wie viele Tastendrücke braucht man mindestens, um genau 100 zu erreichen? Antworte nur mit der Zahl."
    prompt_es: "Una calculadora muestra '1'. Tiene dos botones: el Botón A multiplica el número mostrado por 2, el Botón B suma 1. ¿Cuál es el número mínimo de pulsaciones para llegar exactamente a 100? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["8"]
    not_expected: ["9", "10", "11", "12"]

  - id: "advanced-self-referential"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "Find a 10-digit sequence d0 d1 d2 d3 d4 d5 d6 d7 d8 d9 (leading zeros allowed) where digit di equals the number of times digit i appears in the entire sequence. For example, d3 tells you how many 3s exist across all ten positions. Reply with just the 10 digits in order."
    prompt_de: "Finde eine 10-stellige Folge d0 d1 d2 d3 d4 d5 d6 d7 d8 d9 (führende Nullen erlaubt), wobei die Ziffer di angibt, wie oft die Ziffer i in der gesamten Folge vorkommt. Zum Beispiel sagt d3, wie viele 3en es in allen zehn Positionen gibt. Antworte nur mit den 10 Ziffern in Reihenfolge."
    prompt_es: "Encuentra una secuencia de 10 dígitos d0 d1 d2 d3 d4 d5 d6 d7 d8 d9 (ceros iniciales permitidos) donde el dígito di es igual al número de veces que el dígito i aparece en toda la secuencia. Por ejemplo, d3 indica cuántos 3 hay en las diez posiciones. Responde solo con los 10 dígitos en orden."
    validator_type: "contains_any"
    expected: ["6210001000"]

  - id: "advanced-epistemic"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "Three perfect logicians (A, B, C) each have a positive integer on their forehead. They see the other two but not their own. They're told: 'Exactly one of the three numbers equals the sum of the other two.' A sees B=2, C=3. B sees A=1, C=3. C sees A=1, B=2. Asked in turn: A says 'No, I don't know my number.' B says 'No.' C says 'Yes, I know.' What is C's number? Reply with just the number."
    prompt_de: "Drei perfekte Logiker (A, B, C) haben jeweils eine positive ganze Zahl auf der Stirn. Sie sehen die anderen zwei, aber nicht ihre eigene. Man sagt ihnen: 'Genau eine der drei Zahlen ist die Summe der anderen zwei.' A sieht B=2, C=3. B sieht A=1, C=3. C sieht A=1, B=2. Der Reihe nach gefragt: A sagt 'Nein, ich weiß meine Zahl nicht.' B sagt 'Nein.' C sagt 'Ja, ich weiß.' Welche Zahl hat C? Antworte nur mit der Zahl."
    prompt_es: "Tres lógicos perfectos (A, B, C) tienen un entero positivo en la frente. Ven los otros dos pero no el suyo. Se les dice: 'Exactamente uno de los tres números es la suma de los otros dos.' A ve B=2, C=3. B ve A=1, C=3. C ve A=1, B=2. Preguntados en turno: A dice 'No, no sé mi número.' B dice 'No.' C dice 'Sí, lo sé.' ¿Cuál es el número de C? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["3"]

  - id: "advanced-clock-trisection"
    difficulty: 5
    category: "Advanced Reasoning"
    prompt_en: "On a standard analog clock, the hour hand, minute hand, and second hand all move continuously at their usual constant rates. How many times in a 12-hour period are all three hands exactly 120 degrees apart from each other (perfectly trisecting the clock face)? Reply with just the number."
    prompt_de: "Auf einer analogen Standarduhr bewegen sich Stunden-, Minuten- und Sekundenzeiger kontinuierlich mit ihren üblichen konstanten Geschwindigkeiten. Wie oft in einem 12-Stunden-Zeitraum stehen alle drei Zeiger genau 120 Grad voneinander entfernt (perfekte Dreiteilung des Zifferblatts)? Antworte nur mit der Zahl."
    prompt_es: "En un reloj analógico estándar, las manecillas de hora, minuto y segundo se mueven continuamente a sus velocidades constantes habituales. ¿Cuántas veces en un período de 12 horas están las tres manecillas exactamente a 120 grados una de otra (trisectando perfectamente la esfera)? Responde solo con el número."
    validator_type: "contains_any"
    expected: ["0"]
