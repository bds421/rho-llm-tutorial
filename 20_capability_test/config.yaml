report_dir: "reports"

# Model IDs must match the rho/llm registry exactly (see rho/llm/registry.go).
#
# Fields:
#   provider:        rho/llm provider name (anthropic, gemini, xai, ollama, …)
#   model:           exact registry ID
#   api_key_env:     env var holding the API key — model is skipped if unset/empty
#   base_url:        optional endpoint override
#   timeout_seconds: per-request deadline (default: 120)

models:

  # ---------------------------------------------------------------------------
  # Anthropic  (ANTHROPIC_API_KEY)
  # ---------------------------------------------------------------------------
  # - provider: "anthropic"
  #   model: "claude-3-haiku-20240307"
  #   api_key_env: "ANTHROPIC_API_KEY"
  # - provider: "anthropic"
  #   model: "claude-sonnet-4-0"
  #   api_key_env: "ANTHROPIC_API_KEY"
  # - provider: "anthropic"
  #   model: "claude-opus-4-0"
  #   api_key_env: "ANTHROPIC_API_KEY"
  # - provider: "anthropic"
  #   model: "claude-opus-4-1"
  #   api_key_env: "ANTHROPIC_API_KEY"
  # - provider: "anthropic"
  #   model: "claude-sonnet-4-5"
  #   api_key_env: "ANTHROPIC_API_KEY"
  # - provider: "anthropic"
  #   model: "claude-opus-4-5"
  #   api_key_env: "ANTHROPIC_API_KEY"
  - provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key_env: "ANTHROPIC_API_KEY"
  - provider: "anthropic"
    model: "claude-sonnet-4-6"
    api_key_env: "ANTHROPIC_API_KEY"
  - provider: "anthropic"
    model: "claude-opus-4-6"
    api_key_env: "ANTHROPIC_API_KEY"

  # ---------------------------------------------------------------------------
  # Google Gemini  (GEMINI_API_KEY)
