name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet all modules
        run: make vet-all

      - name: Build all tutorials
        run: make build-all

      - name: Run stress tests
        run: make test-stress
